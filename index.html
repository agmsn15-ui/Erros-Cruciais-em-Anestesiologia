  { cat:0, sev:"fatal", title:"Pré-oxigenação insuficiente antes de via aérea difícil", body:"CRF substituída por O₂ insuficientemente → janela de apneia segura reduzida. Critério: FeO₂ ≥ 0,9. Obesos e gestantes dessaturam em < 3 min." },

  { cat:0, sev:"fatal", title:"Cilindro de O₂ de reserva aberto mascarando falha da tubulação central", body:"Falha silenciosa detectada só quando o cilindro esgota. Fechar o cilindro após verificação da carga é etapa obrigatória do checklist pré-anestésico." },
  { cat:0, sev:"grave", title:"Extubação acidental durante transporte", body:"Paciente sedado/relaxado sem via aérea definitiva fora da sala. Checar fixação antes de qualquer movimentação. Manter equipamento de via aérea de emergência no transporte." },
  { cat:0, sev:"grave", title:"Falha em reconhecer intubação endobrônquica", body:"Tubo avança para brônquio principal direito → hipoxemia + hiperinssuflação do pulmão ventilado. Verificar simetria da ausculta e curvas de fluxo/volume após posicionamento." },
  { cat:0, sev:"grave", title:"Não reconhecer via aérea difícil não antecipada e não ter plano B", body:"Ausência de dispositivo supraglótico de resgate (LMA) ou set de cricotireoidotomia na sala quando intubação falha. Todo caso deve ter plano B e plano C explícitos antes da indução." },
  { cat:0, sev:"grave", title:"Quantidade insuficiente de O₂ no cilindro de transporte", body:"Cilindro E com 500 psi fornece apenas ~15 min a 2 L/min. Calcular consumo previsto para o transporte e considerar margem de segurança ampla." },

  { cat:1, sev:"fatal", title:"Potássio IV não diluído em bolus", body:"KCl puro (1 mEq/mL) → hiperpotassemia imediata → FV/assistolia. Medicamento de alto alerta ISMP. Armazenar separado, sempre diluir, taxa máx 20 mEq/h periférico." },
  { cat:1, sev:"fatal", title:"Succinilcolina em miopatia/queimado/desnervado", body:"Upregulation de RACh → saída maciça de K⁺ → hiperpotassemia e parada cardíaca. Risco latente em imobilizados > 72h, lesão medular > 48h, Duchenne/Becker." },
  { cat:1, sev:"fatal", title:"Succinilcolina como gatilho de Hipertermia Maligna", body:"Em portadores de mutação RYR1 → liberação descontrolada de Ca²⁺ → hipermetabolismo. Dantroleno 2,5 mg/kg IV imediato. Sempre questionar história familiar." },
  { cat:1, sev:"fatal", title:"Fenitoína IV rápida não diluída", body:"Propileno glicol + bloqueio de Na⁺ cardíaco → bradicardia, BAV, hipotensão refratária. Máx 50 mg/min, diluída em SF, com ECG contínuo." },
  { cat:1, sev:"fatal", title:"Neostigmina sem antimuscarínico", body:"Ativação M₂ cardíaca → bradicardia severa/assistolia. Glicopirrolato 0,2 mg por 1 mg de neostigmina. Administrar juntos, não sequencialmente." },
  { cat:1, sev:"fatal", title:"Hemotransfusão ABO incompatível", body:"Hemólise intravascular → CID → FMO. No anestesiado: hemoglobinúria e sangramento difuso são os primeiros sinais. Dupla checagem é prevenção única eficaz." },
  { cat:1, sev:"grave", title:"Vasoconstritor peridural/intratecal em dose espinal (troca de seringa)", body:"Adrenalina/noradrenalina intratecal acidental → vasoespasmo medular → isquemia. Identificação clara e definitiva das seringas é essencial." },
  { cat:1, sev:"grave", title:"Confusão entre vecurônio e efedrina (ampolas de aparência similar)", body:"Bloqueio neuromuscular não intencional → apneia em paciente acordado ou sem via aérea assegurada. Causa clássica descrita em múltiplos relatos de eventos sentinela." },
  { cat:1, sev:"grave", title:"Administração de oxitocina em bolus rápido", body:"Vasodilatação sistêmica intensa + taquicardia reflexa → colapso hemodinâmico, especialmente em cardiopatas. Protocolo: infusão lenta 3–5 UI em 5–10 min mínimo." },
  { cat:1, sev:"grave", title:"Protamina em paciente com alergia/exposição prévia à insulina NPH", body:"IgE anti-protamina → anafilaxia grave. Verificar história de diabetes em uso de NPH, vasectomia, alergia a peixe. Ter adrenalina pronta." },
  { cat:1, sev:"grave", title:"Dose excessiva de anestésico local intratecal por confusão de concentração", body:"Bupivacaína 0,75% hiperbárica vs 0,5% → raquianestesia total, parada respiratória e colapso cardiovascular. Checar concentração e volume antes de injetar." },

  { cat:2, sev:"fatal", title:"Pneumotórax hipertensivo iatrogênico não reconhecido", body:"Pós-punção de subclávia/jugular ou bloqueio supraclavicular. Diagnóstico clínico imediato (ausência de MV + hipotensão + jugulares). Não esperar Rx. Agulha 14G no 2º EIC." },
  { cat:2, sev:"fatal", title:"Injeção intravascular de anestésico local (LAST)", body:"Convulsão → colapso cardiovascular (bupivacaína: FV refratária). Emulsão lipídica 20% (Intralipid) 1,5 mL/kg em bolus. Deve estar disponível em todo local de bloqueio." },
  { cat:2, sev:"fatal", title:"Embolia gasosa por CVC: inserção ou retirada", body:"Gradiente negativo ao abrir o sistema → ar entra pela bainha venosa. Posição de Trendelenburg + Valsalva ao retirar. Ocluir imediatamente qualquer abertura do sistema." },
  { cat:2, sev:"fatal", title:"Embolia gasosa por bolsa IV pressurizada com ar residual", body:"Bolsas pressurizadas com coluna de ar injetam bolus gasoso direto na veia. Purgar completamente o equipo e a bolsa antes de pressurizar." },
  { cat:2, sev:"fatal", title:"Dreno de ventriculostomia conectado a bolsa pressurizada", body:"Infusão de SF no sistema ventricular → PIC aguda → herniação cerebral. Conectores ISO 80369 previnem a troca. Verificação visual obrigatória de cada linha." },
  { cat:2, sev:"grave", title:"Torniquete de acesso venoso esquecido no paciente anestesiado", body:"Isquemia silenciosa → necrose muscular e lesão nervosa irreversível. O paciente não comunica dor. Checagem ativa dos membros durante o caso." },
  { cat:2, sev:"grave", title:"Punção arterial não reconhecida durante tentativa de CVC", body:"Sangue pulsátil pode não ser óbvio em hipotensão. Dilatação acidental da artéria carótida/subclávia → AVC hemorrágico ou hematoma compressivo. Confirmar com manometria ou USG antes de dilatar." },
  { cat:2, sev:"grave", title:"Posicionamento inadequado com lesão de plexo braquial", body:"Tração por abdução excessiva do braço (> 90°) ou compressão por apoio mal posicionado. Lesão permanente possível. Verificar posição e registrar antes de cobrir com campos." },
  { cat:2, sev:"grave", title:"Lesão de córnea por ressecamento ocular intraoperatório", body:"Reflexo palpebral abolido pela anestesia + olhos abertos → ceratite de exposição e abrasão corneana. Oclusão com fita adesiva e lubrificante ocular em todo caso ≥ 30 min." },
  { cat:2, sev:"grave", title:"Retenção de agulha/fragmento de cateter no espaço peridural/intratecal", body:"Fratura de agulha de Tuohy ou cateter ao tentar retirar contra a bisel → corpo estranho no neuroeixo. Nunca retirar cateter com agulha no lugar sem remover o conjunto." },

  // 3 — EQUIPAMENTOS
  { cat:3, sev:"fatal", title:"Circuito de anestesia desconectado sem alarme audível ativo", body:"Paciente em apneia com ventilador funcionando mas sem gás chegando ao paciente. Alarme de desconexão DEVE estar ativo e audível. A capnografia plana é o sinal." },
  { cat:3, sev:"fatal", title:"Vaporizador incorreto ou mal montado com agente errado", body:"Sevoflurano em vaporizador de isoflurano → concentração imprecisa, possível superdosagem ou subdosagem com despertar intraoperatório. Checar identificação do vaporizador no início do turno." },
  { cat:3, sev:"fatal", title:"Conexão cruzada de gases (O₂ conectado ao N₂O e vice-versa)", body:"Possível em conexões danificadas ou fora do padrão DISS. Instalação sempre verificada por engenharia clínica. Durante uso: analisador de gás inspirado obrigatório." },
  { cat:3, sev:"grave", title:"Falha do fluxômetro com entrega de mistura hipóxica", body:"Válvula de N₂O travada aberta e O₂ fechada → FiO₂ < 0,21. Analisador de O₂ inspirado é a única salvaguarda confiável quando o sistema de proporcionalidade falha." },
  { cat:3, sev:"grave", title:"Cal sodada esgotada com reinalação de CO₂", body:"Absolvedor saturado → CO₂ se acumula no circuito → hipercapnia progressiva → acidose, hipertensão, arritmias. Checar cor do indicador e resistência à ventilação manual." },

  { cat:4, sev:"fatal", title:"Raquianestesia total (alta espinhal não intencional)", body:"Dose intratecal de peridural → colapso cardiovascular + apneia. Sequência: hipotensão → bradicardia → parada. Posição supina imediata, vasopressor, intubação urgente." },

  { cat:7, sev:"fatal", title:"Passagem de plantão sem comunicação de instabilidade em curso", body:"Handoff inadequado → novo anestesiologista sem contexto de sangramento, arritmia ou hipotensão em tratamento. Usar protocolo SBAR (Situação, Background, Avaliação, Recomendação)." },

const bClass = ["b0","b1","b2","b3","b4","b5","b6","b7"];
const catLabel = ["VA","Rx","Px","Eq","NX","Mon","Pop","TC"];

function renderCat(cat) {
  const list = document.getElementById("l"+cat);
  list.innerHTML = "";
  data.filter(d => d.cat === cat).forEach((d,i) => {
    const div = document.createElement("div");
    div.className = "eitem";
    const sevLabel = d.sev === "fatal" ? "fatal" : d.sev === "grave" ? "grave" : "moderado";
    div.innerHTML = `
      <div class="eitem-header" onclick="this.parentElement.classList.toggle('open')">
        <span class="badge ${bClass[cat]}">${catLabel[cat]}</span>
        <span class="eitem-title">${d.title}<span class="severity ${d.sev}">${sevLabel}</span></span>
      </div>
      <div class="eitem-body">${d.body}</div>
    `;
    list.appendChild(div);
  });
}
